<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
      <h2>My LMS</h2>
      <ul>
        <li>Dashboard</li>
        <li>Courses</li>
        <li>Calendar</li>
        <li>Inbox</li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="main">
      <h1>Dashboard</h1>

      <div class="courses">
        <div class="card" onclick="goToCourse('math')">
          <h2>Math</h2>
          <p>Algebra & Geometry</p>
        </div>

        <div class="card" onclick="goToCourse('science')">
          <h2>Science</h2>
          <p>Labs & Experiments</p>
        </div>

        <div class="card" onclick="goToCourse('history')">
          <h2>History</h2>
          <p>World History</p>
        </div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
